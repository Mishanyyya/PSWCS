[tool.ruff]
# Какие правила включить
lint.select = [
    "E", 
    "W", 
    "F", 
    "I", 
    "UP", 
]

# Какие правила игнорировать
lint.ignore = [
    "E501",
]

# Максимальная длина строки
line-length = 120

# Исключаемые директории
exclude = [
    ".git",
    "__pycache__",
    "venv",
    "env",
    "*.pyc",
    "migrations",
]

[tool.ruff.lint.isort]
# Настройка сортировки импортов
known-first-party = ["database"]  # ваши локальные модули
force-single-line = false
force-wrap-aliases = false
lines-after-imports = 2

[tool.ruff.lint.per-file-ignores]
# Специфичные игноры для определенных файлов
"__init__.py" = ["F401"]  # игнорируем неиспользуемые импорты в __init__.py

[tool.ruff.format]
# Настройки форматирования
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = 80